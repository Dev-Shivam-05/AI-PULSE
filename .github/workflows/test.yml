name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimal test deps
        run: pip install pytest requests Pillow edge-tts faster-whisper soundfile numpy
      - name: Run the suite
        run: python -m pytest tests/ -q
