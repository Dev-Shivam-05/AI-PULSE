name: AI Pulse — Auto Publish

# Free, always-on posting. Runs on GitHub's servers on a schedule (not your laptop).
#
# TWO cron entries because GitHub's cron is best-effort (observed 1-2h late):
# the second firing is a free retry. The pipeline's already-published-today
# guard makes extra firings no-ops, so this can never double-publish or burn
# API quota. Off-:00 minutes fire noticeably closer to on-time.
on:
  schedule:
    - cron: "23 12 * * *"     # 12:23 UTC ≈ 5:53 PM IST — primary
    - cron: "53 14 * * *"     # 14:53 UTC ≈ 8:23 PM IST — retry (skips if day is done)
  workflow_dispatch: {}        # manual trigger from the Actions tab (also guard-protected)

permissions:
  contents: write              # save used-topics / production-log state back to the repo
  issues: write                # failure alerts become GitHub issues (-> email notification)
  actions: write               # keepalive: re-enable this cron (GitHub disables idle schedules)

concurrency:
  group: ai-pulse-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation

      - name: Cache whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-base-v1

      - name: Cache Kokoro voice model (~310 MB, downloads once)
        uses: actions/cache@v4
        with:
          path: assets/models
          key: kokoro-model-v1.0

      - name: Install Python deps
        run: pip install -r requirements-ci.txt

      - name: Write credentials from secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_SECRET_B64: ${{ secrets.YT_CLIENT_SECRET_B64 }}
          YT_TOKEN_B64: ${{ secrets.YT_TOKEN_B64 }}
        run: |
          printf 'GEMINI_API_KEY=%s\nPEXELS_API_KEY=%s\n' "$GEMINI_API_KEY" "$PEXELS_API_KEY" > .env
          echo "$YT_CLIENT_SECRET_B64" | base64 -d > client_secret.json
          echo "$YT_TOKEN_B64" | base64 -d > youtube_token.pickle

      - name: Generate + publish a video (+ Shorts)
        run: python -m factverse.ai_pipeline publish

      # Learning-loop data: daily channel/video performance snapshot (never fatal)
      - name: Collect channel analytics
        if: always()
        continue-on-error: true
        run: python -m factverse.analytics

      # Runs even when publishing failed — losing used-topic state causes duplicate videos.
      # Union-merge against fresh origin/main instead of rebase: append-only JSON
      # files conflict under rebase, which is exactly how state was lost before.
      - name: Save state back to repo
        if: always()
        run: |
          git config user.name "ai-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          ok=0
          for i in 1 2 3; do
            mkdir -p /tmp/state_incoming
            for f in used_topics.json used_urls.json output/production_log.json \
                     state/failed_topics.json state/runs.jsonl state/analytics.jsonl; do
              [ -f "$f" ] && cp "$f" /tmp/state_incoming/ || true
            done
            git fetch origin main --quiet
            git checkout -B main origin/main --quiet
            python -m factverse.state_merge /tmp/state_incoming
            git add used_topics.json used_urls.json output/production_log.json state 2>/dev/null || true
            if git commit -m "state update [skip ci]" --quiet; then
              if git push origin main; then ok=1; break; fi
            else
              echo "no state change"; ok=1; break
            fi
          done
          if [ "$ok" != "1" ]; then
            echo "::error::state push failed — duplicate topics possible tomorrow"
            exit 1
          fi

      - name: Alert on failure (GitHub issue → email notification)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🔴 AI Pulse publish failed — $(date -u +%Y-%m-%d)" \
            --body "The scheduled run failed. Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Most common causes:
          - YouTube token expired (re-auth locally, update YT_TOKEN_B64 secret)
          - Gemini/Pexels key dead or over quota
          - Policy/QA gate blocked a bad video (check the run log — that is the system working)" \
            || echo "issue creation failed (is Issues enabled on the repo?)"

      # GitHub silently disables cron workflows after ~60 days without repo activity.
      - name: Keep the schedule alive
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/publish.yml/enable" || true
